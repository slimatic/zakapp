name: Test

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install root dependencies
      run: npm install

    - name: Install server dependencies
      run: cd server && npm install

    - name: Generate Prisma client
      run: cd server && npx prisma generate

    - name: Install client dependencies
      run: cd client && npm install --legacy-peer-deps

    - name: Run server tests
      run: cd server && npm test
      env:
        CI: true
        NODE_ENV: test
        ENCRYPTION_KEY: '00000000000000000000000000000000'
        JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
        DATABASE_URL: file:./test/test.db

    - name: Run client unit tests
      run: cd client && npm test -- --run
      env:
        CI: true

    - name: Build client
      run: cd client && npm run build

    - name: Build server
      run: cd server && npm run build

    # Note: Secret scanning, dependency vulnerability scanning, static code
    # analysis, and container security scanning are handled by the dedicated
    # security-scan.yml workflow, which uses professional tools (gitleaks,
    # Snyk, CodeQL, Semgrep, Trivy) and runs conditionally based on changed
    # paths. No need to duplicate them here.

