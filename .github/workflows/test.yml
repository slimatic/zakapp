name: Test

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install root dependencies
      run: npm install

    - name: Install server dependencies
      run: cd server && npm install

    - name: Install client dependencies
      run: cd client && npm install --legacy-peer-deps

    - name: Run client unit tests
      run: cd client && npm test -- --run
      env:
        CI: true

    # Server tests require database setup, skip in CI for now
    # - name: Run server tests
    #   run: cd server && npm test
    #   env:
    #     CI: true

    - name: Build client
      run: cd client && npm run build

    - name: Build server
      run: cd server && npm run build

    # ── Secret Scanning (blocks commits with secrets) ──
    - name: Secret Detection Scan
      run: |
        # Block if any .env* files (except .env.example) are present in tree
        FORBIDDEN=$(find . -name ".env*" -not -name ".env.example" -not -name ".env.*.example" -not -name ".env.*.template" -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null || true)
        if [ -n "$FORBIDDEN" ]; then
          echo "❌ Forbidden env files found in working tree:"
          echo "$FORBIDDEN"
          exit 1
        fi

        # Block if any private keys or credential files exist
        FORBIDDEN_KEYS=$(find . \( -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name "*.pfx" -o -name "credentials.json" -o -name "token.json" \) -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null || true)
        if [ -n "$FORBIDDEN_KEYS" ]; then
          echo "❌ Forbidden key/credential files found:"
          echo "$FORBIDDEN_KEYS"
          exit 1
        fi

        echo "✅ No forbidden secret files detected in working tree."

    # ── npm audit (dependency vulnerability check, informational only) ──
    - name: Run npm audit (server)
      run: cd server && npm audit --audit-level=high || true

    - name: Run npm audit (client)
      run: cd client && npm audit --audit-level=high || true

